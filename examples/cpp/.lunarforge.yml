version: 1

project:
  name: imgui-tool

verify:
  commands:
    - id: build_debug
      run: cmake --build build --config Debug
    - id: test
      run: ctest --test-dir build --output-on-failure
    - id: build_release
      run: cmake --build build --config Release

explain:
  agent: claude
  command: claude
  args:
    - --print
    - --permission-mode
    - plan

evidence:
  dir: .lf/runs
  require_fresh_diff: true
