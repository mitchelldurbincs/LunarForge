# Node project LunarForge CI workflow (consumer / go-install mode).
#
# This is a normal Node project that *uses* LunarForge — it does not contain
# LunarForge's source, so `lf` is installed with `go install` rather than built.
# LunarForge mirrors your verify.commands remotely but does NOT install your
# project's dependencies — Node repos still need Node set up and `npm ci` run
# before `lf ci`. The actual lint/test/build still lives in .lunarforge.yml and
# is invoked once, by `lf ci`.
#
# Generated by: lf gen-actions --install-mode go-install
# (with `ci.setup_commands: [npm ci]` for the dependency step). The setup-node
# step is added on top because `go install` only provides `lf`, not Node.
name: LunarForge

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: lunarforge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install LunarForge
        run: |
          go install github.com/mitchelldurbincs/lunarforge/cmd/lf@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # --- Project setup: install Node and dependencies before lf ci ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run LunarForge CI
        run: lf ci

      - name: Upload LunarForge evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lunarforge-evidence
          path: .lf/runs/**
