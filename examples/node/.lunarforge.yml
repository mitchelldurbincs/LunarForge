version: 1

project:
  name: node-app

verify:
  commands:
    - id: lint
      run: npm run lint
    - id: typecheck
      run: npm run typecheck
    - id: test
      run: npm test
    - id: build
      run: npm run build

explain:
  agent: claude
  command: claude
  args:
    - --print
    - --permission-mode
    - plan

evidence:
  dir: .lf/runs
  require_fresh_diff: true

# Optional: configure the GitHub Actions mirror generated by `lf gen-actions`.
# Everything here is optional — defaults are workflow_name: LunarForge,
# runs_on: ubuntu-latest, timeout_minutes: 30, upload_artifacts: true.
# setup_commands run before `lf ci` so the runner has the project's deps.
# (You still need to set up Node itself in the workflow — see
# examples/github-actions/lunarforge-node.yml.)
ci:
  github_actions:
    workflow_name: LunarForge
    runs_on: ubuntu-latest
    timeout_minutes: 30
    upload_artifacts: true
  setup_commands:
    - npm ci
